# Reverse proxy for local docker-compose stack.
# Routes:
#   /            -> frontend (static NGINX container)
#   /api/        -> backend REST
#   /socket.io/  -> backend WebSocket (upgrade headers required)
#   /ai/         -> internal ai-service (kept behind proxy, not public in prod)

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  sendfile on;
  server_tokens off;

  # WebSocket upgrade mapping
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream frontend { server frontend:80; }
  upstream backend  { server backend:4000; }
  upstream ai       { server ai-service:5000; }

  server {
    listen 80;

    # Reasonable body limit for code submissions
    client_max_body_size 2m;

    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 75s;
    }

    location /ai/ {
      proxy_pass http://ai/;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
    }
  }
}
